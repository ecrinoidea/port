<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Proyek</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-nav">
            <div class="nav-brand">✦ Admin Panel</div>
            <div class="nav-links">
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/admin/profiles">Profil</a>
                <a href="/admin/skills">Skills</a>
                <a href="/admin/experience">Pengalaman</a>
                <a href="/admin/projects" class="active">Proyek</a>
                <a href="/admin/contact">Kontak</a>
                <a href="/admin/logout">Logout</a>
            </div>
        </nav>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Kelola Proyek</h1>
            </div>

            <div class="admin-content">
                <div class="form-section">
                    <h2>Tambah/Edit Proyek</h2>
                    <form id="projectForm">
                        <input type="hidden" id="prId">
                        <div class="form-group">
                            <label>Judul Proyek *</label>
                            <input type="text" id="prTitle" placeholder="Nama proyek" required>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi</label>
                            <textarea id="prDescription" placeholder="Deskripsi proyek"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Tech Stack (pisahkan dengan koma)</label>
                            <input type="text" id="prTechStack" placeholder="JavaScript, React, Firebase">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>URL Gambar</label>
                                <input type="url" id="prImageUrl" placeholder="https://example.com/image.jpg">
                            </div>
                            <div class="form-group">
                                <label>URL Demo</label>
                                <input type="url" id="prDemoUrl" placeholder="https://demo.example.com">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>URL Repository</label>
                            <input type="url" id="prRepoUrl" placeholder="https://github.com/user/project">
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="prIsFeatured">
                                Tampilkan sebagai Featured
                            </label>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Simpan Proyek</button>
                            <button type="reset" class="btn-secondary">Reset</button>
                        </div>
                    </form>
                </div>

                <div class="data-section">
                    <h2>Daftar Proyek</h2>
                    <div id="projectsList" class="projects-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='admin/js/projects.js') }}"></script>
</body>
</html>
