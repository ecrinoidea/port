<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Profil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-nav">
            <div class="nav-brand">✦ Admin Panel</div>
            <div class="nav-links">
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/admin/profiles" class="active">Profil</a>
                <a href="/admin/skills">Skills</a>
                <a href="/admin/experience">Pengalaman</a>
                <a href="/admin/projects">Proyek</a>
                <a href="/admin/contact">Kontak</a>
                <a href="/admin/logout">Logout</a>
            </div>
        </nav>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Kelola Profil</h1>
            </div>

            <div class="admin-content">
                <div class="form-section">
                    <h2>Edit/Tambah Profil</h2>
                    <form id="profileForm">
                        <div class="form-group">
                            <label>Nama *</label>
                            <input type="text" id="pName" placeholder="Nama lengkap" required>
                        </div>
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="pTitle" placeholder="Gelar atau posisi">
                        </div>
                        <div class="form-group">
                            <label>Bio</label>
                            <textarea id="pBio" placeholder="Deskripsi singkat tentang Anda"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="pEmail" placeholder="email@example.com">
                            </div>
                            <div class="form-group">
                                <label>Telepon</label>
                                <input type="tel" id="pPhone" placeholder="+62 123-4567-8900">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Lokasi</label>
                            <input type="text" id="pLocation" placeholder="Kota, Negara">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>GitHub</label>
                                <input type="url" id="pGithub" placeholder="https://github.com/username">
                            </div>
                            <div class="form-group">
                                <label>LinkedIn</label>
                                <input type="url" id="pLinkedin" placeholder="https://linkedin.com/in/username">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Instagram</label>
                            <input type="url" id="pInstagram" placeholder="https://instagram.com/username">
                        </div>
                        <div class="form-group">
                            <label>URL Foto</label>
                            <input type="url" id="pPhoto" placeholder="https://example.com/photo.jpg">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Simpan Profil</button>
                            <button type="reset" class="btn-secondary">Reset</button>
                        </div>
                    </form>
                </div>

                <div class="data-section">
                    <h2>Data Profil</h2>
                    <div id="profilesList" class="profiles-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='admin/js/profiles.js') }}"></script>
</body>
</html>
