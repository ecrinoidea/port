<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pengalaman</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/admin.css') }}">
</head>
<body>
    <div class="admin-container">
        <nav class="admin-nav">
            <div class="nav-brand">✦ Admin Panel</div>
            <div class="nav-links">
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/admin/profiles">Profil</a>
                <a href="/admin/skills">Skills</a>
                <a href="/admin/experience" class="active">Pengalaman</a>
                <a href="/admin/projects">Proyek</a>
                <a href="/admin/contact">Kontak</a>
                <a href="/admin/logout">Logout</a>
            </div>
        </nav>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Kelola Pengalaman Kerja</h1>
            </div>

            <div class="admin-content">
                <div class="form-section">
                    <h2>Tambah/Edit Pengalaman</h2>
                    <form id="experienceForm">
                        <input type="hidden" id="eId">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Perusahaan *</label>
                                <input type="text" id="eCompany" placeholder="Nama perusahaan" required>
                            </div>
                            <div class="form-group">
                                <label>Posisi *</label>
                                <input type="text" id="ePosition" placeholder="Jabatan/Posisi" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Tanggal Mulai</label>
                                <input type="text" id="eStartDate" placeholder="Jan 2023">
                            </div>
                            <div class="form-group">
                                <label>Tanggal Selesai</label>
                                <input type="text" id="eEndDate" placeholder="Dec 2023">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="eIsCurrent">
                                Pekerjaan Saat Ini
                            </label>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi</label>
                            <textarea id="eDescription" placeholder="Deskripsi tugas dan tanggung jawab"></textarea>
                        </div>
                        <div class="form-group">
                            <label>URL Logo Perusahaan</label>
                            <input type="url" id="eLogoUrl" placeholder="https://example.com/logo.png">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Simpan Pengalaman</button>
                            <button type="reset" class="btn-secondary">Reset</button>
                        </div>
                    </form>
                </div>

                <div class="data-section">
                    <h2>Daftar Pengalaman</h2>
                    <div id="experienceList" class="experience-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='admin/js/experience.js') }}"></script>
</body>
</html>
